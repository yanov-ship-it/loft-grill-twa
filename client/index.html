<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shawarma Ordering Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Shawarma Heaven!</h1>
    </header>
    <main>
        <section id="menu">
            <h2>Menu</h2>
            <ul>
                <li>Shawarma Chicken - $5</li>
                <li>Shawarma Beef - $6</li>
                <li>Shawarma Vegan - $4</li>
            </ul>
        </section>
        <section id="cart">
            <h2>Your Cart</h2>
            <ul id="cart-items"></ul>
            <p>Total: $<span id="total">0</span></p>
            <button id="checkout">Checkout</button>
        </section>
        <section id="payment">
            <h2>Payment</h2>
            <form id="payment-form">
                <label for="card-number">Card Number:</label>
                <input type="text" id="card-number" required>
                <button type="submit">Pay</button>
            </form>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
